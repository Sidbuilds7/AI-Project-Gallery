name: Deploy Celestial Pathway site to GitHub Pages

# Deploys the static site (repo root) to GitHub Pages.
# One-time setup: GitHub repo → Settings → Pages → Build and deployment →
# Source = "GitHub Actions". After that, every push to this branch publishes.

on:
  push:
    branches:
      - cursor/celestial-pathway-site-0c4a
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
